<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>RAYMAX — Login</title>

  <!-- Google Fonts: Datatype + Josefin Sans -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Josefin+Sans:ital,wght@0,100..700;1,100..700&family=Roboto+Mono:wght@400;500;700&display=swap" rel="stylesheet">

  <!-- Stylesheet -->
  <link rel="stylesheet" href="/auth/auth.css" />

  <!-- Firebase Compat SDKs -->
  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>

  <!-- Load Firebase config (ignored in git to protect credentials) -->
  <script src="../config.js"></script>

  <!-- Firebase Initialization -->
  <script>
    if (window.firebaseConfig) {
      firebase.initializeApp(window.firebaseConfig);
    } else {
      console.error("Firebase config missing! Please create config.js in root using config.example.js as template.");
    }
    window.auth = firebase.auth();
    window.db = firebase.firestore();
  </script>

  <!-- React 18 + ReactDOM -->
  <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
</head>
<body>
  <div id="root"></div>
  <div id="recaptcha-container"></div>

  <!-- Auth App (Pre-compiled to vanilla JS for speed) -->
  <script src="/auth/auth.js"></script>
</body>
</html>
