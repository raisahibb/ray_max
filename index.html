<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>RAYMAX — Solar Tracking System</title>
<meta name="description" content="Real-time solar panel tracking system with GPS, live weather, and 3D visualization."/>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Josefin+Sans:ital,wght@0,100..700;1,100..700&family=Roboto+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css?v=11.0"/>

<!-- Force scroll to top on every load — prevents browser from restoring old scroll position -->
<script>
  if ('scrollRestoration' in history) history.scrollRestoration = 'manual';
  window.addEventListener('load', () => window.scrollTo(0, 0));
  // Also reset immediately in case load fires late
  document.addEventListener('DOMContentLoaded', () => window.scrollTo(0, 0));
</script>

<!-- React 18 + ReactDOM CDN -->
<script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
<script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
</head>
<body>

<!-- React mounts here -->
<div id="root"></div>

<!-- Chart.js 4 — required by HistoryCharts component -->
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>

<!-- Firebase Compat SDKs -->
<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>

<!-- Load Firebase config (ignored in git to protect credentials) -->
<script src="config.js"></script>

<!-- Firebase initialization — window.auth and window.db available globally -->
<script>
  if (window.firebaseConfig) {
    firebase.initializeApp(window.firebaseConfig);
  } else {
    console.error("Firebase config missing! Please create config.js using config.example.js as a template.");
  }
  window.auth = firebase.auth();
  window.db = firebase.firestore();
</script>



<!-- Utility functions (pure JS — no DOM, no React) -->
<script src="script.js?v=10.0"></script>

<!-- React App (Pre-compiled to vanilla JS for speed) -->
<script src="App.js?v=11.0"></script>

</body>
</html>
